name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests against SAP system'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.3.0
        with:
          go-version: '1.23'
          cache: false
      - name: Run unit tests
        run: go test ./... -count=1 -race
      - name: Verify build
        run: go build -o /dev/null ./cmd/vsp

  integration:
    name: Integration Tests (SAP)
    runs-on: ubuntu-latest
    needs: unit
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true')
    environment: sap-trial
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.3.0
        with:
          go-version: '1.23'
          cache: false
      - name: Run integration tests
        run: go test -tags=integration -v -count=1 -timeout 10m ./pkg/adt/
        env:
          SAP_URL: ${{ secrets.SAP_URL }}
          SAP_USER: ${{ secrets.SAP_USER }}
          SAP_PASSWORD: ${{ secrets.SAP_PASSWORD }}
          SAP_CLIENT: ${{ secrets.SAP_CLIENT }}
