name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

  # Integration tests run on PRs from internal branches (secrets available)
  # Skipped for external/fork PRs (secrets are not exposed)
  integration:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          TEST_SAP_URL: ${{ secrets.TEST_SAP_URL }}
          TEST_SAP_USER: ${{ secrets.TEST_SAP_USER }}
          TEST_SAP_PASSWORD: ${{ secrets.TEST_SAP_PASSWORD }}
          TEST_SAP_CLIENT: ${{ secrets.TEST_SAP_CLIENT }}
          TEST_SAP_INSECURE: ${{ secrets.TEST_SAP_INSECURE }}

  # E2E tests: deploy MCP server to SAP test server, run real tool calls
  # Only runs on PRs from internal branches (needs SSH key + server access)
  e2e:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: test
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.E2E_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.E2E_SERVER }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy MCP server
        run: npm run test:e2e:deploy
        env:
          E2E_SERVER: ${{ secrets.E2E_SERVER }}
          E2E_SERVER_USER: ${{ secrets.E2E_SERVER_USER }}
          SAP_USER: ${{ secrets.SAP_USER }}
          SAP_PASSWORD: ${{ secrets.SAP_PASSWORD }}

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_MCP_URL: http://${{ secrets.E2E_SERVER }}:3000/mcp

      - name: Stop MCP server & collect logs
        if: always()
        run: npm run test:e2e:stop
        env:
          E2E_SERVER: ${{ secrets.E2E_SERVER }}
          E2E_SERVER_USER: ${{ secrets.E2E_SERVER_USER }}

      - name: Upload E2E logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs
          path: /tmp/arc1-e2e-logs/
          retention-days: 7

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-junit
          path: /tmp/arc1-e2e-logs/junit-results.xml
          retention-days: 7
