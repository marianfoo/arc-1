name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

  # Integration tests run on PRs from internal branches (secrets available)
  # Skipped for external/fork PRs (secrets are not exposed)
  integration:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          TEST_SAP_URL: ${{ secrets.TEST_SAP_URL }}
          TEST_SAP_USER: ${{ secrets.TEST_SAP_USER }}
          TEST_SAP_PASSWORD: ${{ secrets.TEST_SAP_PASSWORD }}
          TEST_SAP_CLIENT: ${{ secrets.TEST_SAP_CLIENT }}
          TEST_SAP_INSECURE: ${{ secrets.TEST_SAP_INSECURE }}
